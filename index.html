        padding-top: env(safe-area-inset-top);
      }

      }
      .mb-safe {
        margin-bottom: env(safe-area-inset-bottom);
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Input fields should be selectable */
      input, textarea {

        user-select: text;
